<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Study Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="light-mode">
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Contact Us</h2>
      <button class="btn btn-outline-dark" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div class="card p-4">
      <form onsubmit="handleSubmit(event)">
        <div class="mb-3">
          <label class="form-label">Your Name</label>
          <input type="text" class="form-control" id="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Message (Minimum 20 words)</label>
          <textarea class="form-control" id="message" rows="4" required minlength="20"></textarea>
          <div class="form-text">Word count: <span id="wordCount">0</span>/20</div>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
      <div id="thankYouMessage" class="alert alert-success mt-4 d-none">
        Thank you for reaching out! We'll get back to you soon.
      </div>
    </div>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    function countWords(text) {
      return text.trim().split(/\s+/).filter(word => word.length > 0).length;
    }

    function updateWordCount() {
      const message = document.getElementById("message").value;
      const wordCount = countWords(message);
      document.getElementById("wordCount").textContent = wordCount;
      
      // Change color based on word count
      const wordCountElement = document.getElementById("wordCount");
      if (wordCount >= 50) {
        wordCountElement.style.color = "green";
      } else {
        wordCountElement.style.color = "red";
      }
    }

    function handleSubmit(event) {
      event.preventDefault();
      const message = document.getElementById("message").value;
      const wordCount = countWords(message);
      
      if (wordCount < 20) {
        alert("Please enter at least 50 words in your message.");
        return;
      }
      
      document.getElementById("thankYouMessage").classList.remove("d-none");
      event.target.reset();
      document.getElementById("wordCount").textContent = "0";
      document.getElementById("wordCount").style.color = "red";
    }

    // Add event listener for word counting
    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("message").addEventListener("input", updateWordCount);
    });
  </script>
</body>
</html>
