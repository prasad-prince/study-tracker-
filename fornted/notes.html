<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes - Study Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="light-mode">
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>My Notes</h2>
      <button class="btn btn-outline-dark" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div class="notes-section p-4">
      <h3 class="mb-3">Write Your Notes</h3>
      <div class="mb-3">
        <textarea id="noteInput" class="form-control" rows="4" placeholder="Write something..."></textarea>
      </div>
      <button class="btn btn-primary mb-4" onclick="saveNote()">Add Note</button>

      <h4>Saved Notes</h4>
      <ul id="notesList" class="list-group"></ul>
    </div>
  </div>

  <script>
    // Dark mode toggle
    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    }

    // Persistent notes with backend
    function getToken() { return localStorage.getItem('authToken'); }
    function apiBase() { return (location.protocol === 'file:') ? 'http://localhost:4000' : ''; }

    let notes = [];

    function renderNotes() {
      const list = document.getElementById('notesList');
      list.innerHTML = '';
      notes.forEach((n, idx) => {
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';
        const span = document.createElement('span');
        span.textContent = n;
        const btn = document.createElement('button');
        btn.className = 'btn btn-sm btn-danger';
        btn.textContent = 'Delete';
        btn.onclick = async () => {
          notes.splice(idx, 1);
          renderNotes();
          await saveNotesToServer();
        };
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    async function loadNotes() {
      const token = getToken();
      if (!token) {
        document.getElementById('notesList').innerHTML = '<li class="list-group-item">Please login to load notes.</li>';
        return;
      }
      try {
        const res = await fetch(apiBase() + '/api/data', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        notes = Array.isArray(data?.data?.notes) ? data.data.notes : [];
        renderNotes();
      } catch (_) {
        document.getElementById('notesList').innerHTML = '<li class="list-group-item">Failed to load notes.</li>';
      }
    }

    async function saveNotesToServer() {
      const token = getToken();
      if (!token) return;
      try {
        await fetch(apiBase() + '/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ notes })
        });
      } catch (_) {}
    }

    async function saveNote() {
      const input = document.getElementById('noteInput');
      const text = input.value.trim();
      if (!text) return;
      notes.push(text);
      input.value = '';
      renderNotes();
      await saveNotesToServer();
    }

    document.addEventListener('DOMContentLoaded', loadNotes);
  </script>
</body>
</html>
