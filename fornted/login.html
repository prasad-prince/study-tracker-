<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: background 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    /* Add particle background */
    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: particles 20s linear infinite;
      pointer-events: none;
    }
    @keyframes particles {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50px); }
    }
    /* Enhanced Diagonal Sweep */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 20%, rgba(0, 255, 255, 0.2) 50%, transparent 80%);
      animation: sweep 6s linear infinite;
      pointer-events: none;
    }
    @keyframes sweep {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    /* Secondary sweep for depth */
    body .secondary-sweep {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, transparent 30%, rgba(255, 0, 255, 0.1) 50%, transparent 70%);
      animation: sweep 8s linear infinite reverse;
      pointer-events: none;
    }
    /* Enhanced Spotlight */
    .spotlight {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse 250px 150px at 50% 0%, rgba(0, 255, 255, 0.4) 0%, rgba(0, 255, 255, 0.1) 50%, transparent 100%);
      clip-path: ellipse(250px 150px at 50% 0%);
      opacity: 0;
      animation: spotlightPulse 3s ease-in-out infinite;
      animation-play-state: paused;
      pointer-events: none;
      z-index: 0;
      filter: blur(1px);
    }
    @keyframes spotlightPulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.6; transform: translateX(-50%) scale(1.05); }
    }
    .login-container {
      max-width: 450px;
      width: 100%;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1);
      padding: 40px;
      transition: all 0.3s ease;
      animation: slideIn 0.5s ease-out, float 4s ease-in-out infinite;
      position: relative;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    body.dark-mode {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 50%, #0a0a0a 100%);
    }
    body.dark-mode .login-card {
      background: rgba(45, 45, 45, 0.1);
      color: #f0f0f0;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.2);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h2 {
      color: #333;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 28px;
    }
    body.dark-mode .login-header h2 {
      color: #f0f0f0;
    }
    .login-header p {
      color: #666;
      font-size: 14px;
      margin: 0;
    }
    body.dark-mode .login-header p {
      color: #aaa;
    }
    .form-icon {
      position: relative;
    }
    .form-icon i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      z-index: 1;
    }
    body.dark-mode .form-icon i {
      color: #9896f0;
    }
    .form-icon input,
    .form-icon select {
      padding-left: 45px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      transition: all 0.3s ease;
      height: 48px;
    }
    .form-icon input:focus,
    .form-icon select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      outline: none;
    }
    body.dark-mode .form-icon input,
    body.dark-mode .form-icon select {
      background-color: #3d3d3d;
      border-color: #555;
      color: #f0f0f0;
    }
    body.dark-mode .form-icon select option {
      background-color: #3d3d3d;
      color: #f0f0f0;
    }
    body.dark-mode .form-icon input:focus,
    body.dark-mode .form-icon select:focus {
      border-color: #9896f0;
      box-shadow: 0 0 0 0.2rem rgba(152, 150, 240, 0.25);
    }
    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }
    body.dark-mode .form-label {
      color: #f0f0f0;
    }
    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      margin-top: 10px;
      color: white;
      width: 100%;
      cursor: pointer;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .toggle-mode-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 10px;
      padding: 10px 15px;
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 14px;
      z-index: 1000;
    }
    .toggle-mode-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    .spotlight-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 10px;
      padding: 10px 15px;
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 14px;
      z-index: 1000;
    }
    .spotlight-toggle:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
    body.dark-mode .register-link {
      color: #aaa;
    }
    .register-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    body.dark-mode .register-link a {
      color: #9896f0;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
    .alert-message {
      border-radius: 10px;
      padding: 12px;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }
    .alert-success {
      background-color: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }
    .alert-danger {
      background-color: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    body.dark-mode .alert-success {
      background-color: #1e4620;
      border-color: #2d5f2e;
      color: #7dff7d;
    }
    body.dark-mode .alert-danger {
      background-color: #5a1e1e;
      border-color: #7a2e2e;
      color: #ff7d7d;
    }
    .back-home {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1000;
      padding: 10px 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .back-home:hover {
      transform: translateX(-5px);
      color: #f0f0f0;
      background: rgba(255,255,255,0.2);
    }
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #667eea;
      z-index: 2;
    }
    body.dark-mode .password-toggle {
      color: #9896f0;
    }
    @media (max-width: 576px) {
      .login-card {
        padding: 30px 20px;
      }
      .toggle-mode-btn {
        top: 10px;
        right: 10px;
        padding: 8px 12px;
        font-size: 12px;
      }
      .back-home {
        top: 10px;
        left: 10px;
        font-size: 14px;
        padding: 8px 12px;
      }
      .login-header h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body class="light-mode">
  <!-- Add secondary sweep -->
  <div class="secondary-sweep"></div>
  <!-- Add Spotlight Element -->
  <div class="spotlight" id="spotlight"></div>
  <a href="#" class="back-home" onclick="goHome(event)">
    <i class="fas fa-arrow-left"></i> <span>Back</span>
  </a>
  <button class="spotlight-toggle" onclick="toggleSpotlight()">
    <i class="fas fa-lightbulb"></i> Spotlight OFF
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
        <p>Login to your account to continue</p>
      </div>
      
      <form id="loginForm">
        <div class="mb-4">
          <label for="email" class="form-label">Email Address</label>
          <div class="form-icon">
            <i class="fas fa-envelope"></i>
            <input id="email" type="email" class="form-control" placeholder="Enter your email" required autocomplete="email" />
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="form-icon">
            <i class="fas fa-lock"></i>
            <input id="password" type="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" />
            <i class="fas fa-eye password-toggle" onclick="togglePassword()" id="toggleIcon"></i>
          </div>
        </div>
        <div class="mb-4">
          <label for="role" class="form-label">Login As</label>
          <div class="form-icon">
            <i class="fas fa-user-tag"></i>
            <select id="role" class="form-control" required>
              <option value="">Select Role</option>
              <option value="student" selected>Student</option>
              <option value="admin">Admin/Teacher</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-login">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
        <div id="loginMsg" class="alert-message"></div>
        <div class="register-link">
          Don't have an account? <a href="#" onclick="goToRegister(event)">Register here</a>
        </div>
      </form>
    </div>
  </div>

<script src="js/script.js"></script>
<script>
  // ===== Utility Functions =====
  function goHome(e) {
    e.preventDefault();
    alert('This would navigate to index.html');
  }

  function goToRegister(e) {
    e.preventDefault();
    window.location.href = 'register.htm';
  }

  function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleIcon.classList.remove('fa-eye');
      toggleIcon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      toggleIcon.classList.remove('fa-eye-slash');
      toggleIcon.classList.add('fa-eye');
    }
  }

  // ===== User Management =====
  function getUsers() {
    const usersData = localStorage.getItem('users');
    if (usersData) {
      try {
        return JSON.parse(usersData);
      } catch (e) {
        console.warn('Could not parse users from storage', e);
        return createDemoUsers();
      }
    }
    return createDemoUsers();
  }

  function createDemoUsers() {
    const demoUsers = {
      'student@example.com': {
        name: 'John Student',
        email: 'student@example.com',
        password: 'student123',
        role: 'student',
        authToken: null
      },
      'admin@example.com': {
        name: 'Jane Admin',
        email: 'admin@example.com',
        password: 'admin123',
        role: 'admin',
        authToken: null
      }
    };
    saveUsers(demoUsers);
    return demoUsers;
  }

  function saveUsers(users) {
    try {
      localStorage.setItem('users', JSON.stringify(users));
    } catch (e) {
      console.warn('Could not save users to storage', e);
    }
  }

  function loginUser(email, password, selectedRole) {
    const users = getUsers();
    const user = users[email];
    
    if (!user) {
      return { success: false, message: 'User not found. Please check your email.' };
    }
    
    if (user.password !== password) {
      return { success: false, message: 'Incorrect password. Please try again.' };
    }
    
    if (user.role !== selectedRole) {
      return { success: false, message: `This account is registered as ${user.role}, not ${role}.` };
    }
    
    const token = 'tok_' + Math.random().toString(36).slice(2) + '_' + Date.now();
    user.authToken = token;
    saveUsers(users);
    
    localStorage.setItem('authToken', token);
    localStorage.setItem('currentUserEmail', email);
    localStorage.setItem('currentUserName', user.name || email);
    localStorage.setItem('currentUserRole', user.role || 'student');
    
    return { success: true };
  }

  // ===== Check if already logged in =====
  function checkExistingSession() {
    const token = localStorage.getItem('authToken');
    const currentUserEmail = localStorage.getItem('currentUserEmail');
    if (token && currentUserEmail) {
      const users = getUsers();
      const user = users[currentUserEmail];
      if (user && user.authToken === token) {
        showMessage('You are already logged in. Redirecting to dashboard...', 'success');
        setTimeout(() => {
          alert('This would redirect to dashboard.html');
        }, 1000);
        return true;
      }
    }
    return false;
  }

  // ===== Form Handling =====
  function showMessage(message, type) {
    const msg = document.getElementById('loginMsg');
    msg.className = `alert-message alert alert-${type}`;
    msg.textContent = message;
    msg.style.display = 'block';
  }

  function hideMessage() {
    const msg = document.getElementById('loginMsg');
    msg.style.display = 'none';
  }

  function trackAttendance(email) {
    const loginTime = new Date().toISOString();
    const today = new Date().toISOString().split('T')[0];
    const userKey = `${email}_${today}`;
    
    let attendance = {};
    try {
      const attendanceData = localStorage.getItem('attendance');
      if (attendanceData) {
        attendance = JSON.parse(attendanceData);
      }
    } catch (e) {
      console.warn('Could not parse attendance', e);
    }
    
    if (!attendance[userKey]) {
      attendance[userKey] = {
        email: email,
        date: today,
        loginTime: loginTime,
        logoutTime: null,
        duration: 0,
        status: 'Present'
      };
    } else if (!attendance[userKey].loginTime) {
      attendance[userKey].loginTime = loginTime;
      attendance[userKey].status = 'Present';
    }
    
    try {
      localStorage.setItem('attendance', JSON.stringify(attendance));
    } catch (e) {
      console.warn('Could not save attendance', e);
    }
  }

  // ===== Initialize =====
  window.addEventListener('DOMContentLoaded', function() {
    if (!checkExistingSession()) {
      getUsers(); // Initialize demo users
    }
    
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const msg = document.getElementById('loginMsg');
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        
        msg.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, role })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Login failed');

          // Save token and user info
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('currentUserEmail', data.user.email);
          localStorage.setItem('currentUserName', data.user.name);
          localStorage.setItem('currentUserRole', data.user.role);

          // Save user to localStorage users map for dashboard auth check
          const users = getUsers();
          users[data.user.email] = { password: '', name: data.user.name, role: data.user.role, authToken: data.token };
          saveUsers(users);

          // Track attendance
          const loginTime = new Date().toISOString();
          const today = new Date().toISOString().split('T')[0];
          const userKey = `${data.user.email}_${today}`;
          let attendance = JSON.parse(localStorage.getItem('attendance') || '{}');
          attendance[userKey] = { email: data.user.email, date: today, loginTime, logoutTime: null, duration: 0, status: 'Present' };
          localStorage.setItem('attendance', JSON.stringify(attendance));
          
          msg.className = 'alert-message alert alert-success';
          msg.textContent = 'Login successful! Marked as Present. Redirecting...';
          msg.style.display = 'block';
          
          setTimeout(() => window.location.href = 'dashboard.html', 500);
        } catch (err) {
          msg.className = 'alert-message alert alert-danger';
          msg.textContent = err.message;
          msg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        }
      });
    }
  });
  // ===== Spotlight Toggle =====
  let spotlightOn = false;
  function toggleSpotlight() {
    const spotlight = document.getElementById('spotlight');
    const btn = document.querySelector('.spotlight-toggle');
    if (spotlightOn) {
      spotlight.style.opacity = '0';
      spotlight.style.animationPlayState = 'paused';
      btn.innerHTML = '<i class="fas fa-lightbulb"></i> Spotlight OFF';
    } else {
      spotlight.style.opacity = '1';
      spotlight.style.animationPlayState = 'running';
      btn.innerHTML = '<i class="fas fa-lightbulb"></i> Spotlight ON';
    }
    spotlightOn = !spotlightOn;
  }
</script>
</body>
</html>
