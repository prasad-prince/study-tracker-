<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="light-mode">

<div class="container mt-5">
  <h2 class="text-center mb-4">Login to Your Account</h2>
  
  <form id="loginForm">
    <div class="mb-3">
      <label for="email" class="form-label">Email address</label>
      <input id="email" type="email" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input id="password" type="password" class="form-control" required />
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
    <div id="loginMsg" class="mt-3 text-center text-danger" style="display:none;"></div>
    <p class="text-center mt-3">Don’t have an account? <a href="register.html">Register</a></p>
  </form>
  
  <div class="text-center mt-4">
    <button class="btn btn-outline-dark" onclick="toggleDarkMode()">Toggle Dark Mode</button>
  </div>
</div>

<script src="js/script.js"></script>
<script>
  const loginForm = document.getElementById('loginForm');
  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');
      msg.style.display = 'none';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {}
        if (!res.ok) throw new Error(data.error || raw || 'Login failed');
        // Save token and basic user info
        if (data.token) localStorage.setItem('authToken', data.token);
        localStorage.setItem('currentUserEmail', data.user.email);
        localStorage.setItem('currentUserName', data.user.name);
        // Redirect to dashboard if exists, else home
        window.location.href = 'dashboard.html';
      } catch (err) {
        msg.textContent = err.message;
        msg.style.display = 'block';
      }
    });
  }
</script>
</body>
</html>
