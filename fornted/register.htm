<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: background 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    /* Add particle background */
    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: particles 20s linear infinite;
      pointer-events: none;
    }
    @keyframes particles {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50px); }
    }
    /* Enhanced Diagonal Sweep */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 20%, rgba(0, 255, 255, 0.2) 50%, transparent 80%);
      animation: sweep 6s linear infinite;
      pointer-events: none;
    }
    @keyframes sweep {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    /* Secondary sweep for depth */
    body .secondary-sweep {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, transparent 30%, rgba(255, 0, 255, 0.1) 50%, transparent 70%);
      animation: sweep 8s linear infinite reverse;
      pointer-events: none;
    }
    /* Enhanced Spotlight */
    .spotlight {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse 250px 150px at 50% 0%, rgba(0, 255, 255, 0.4) 0%, rgba(0, 255, 255, 0.1) 50%, transparent 100%);
      clip-path: ellipse(250px 150px at 50% 0%);
      opacity: 0;
      animation: spotlightPulse 3s ease-in-out infinite;
      animation-play-state: paused;
      pointer-events: none;
      z-index: 0;
      filter: blur(1px);
    }
    @keyframes spotlightPulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.6; transform: translateX(-50%) scale(1.05); }
    }
    .register-container {
      max-width: 450px;
      width: 100%;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .register-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1);
      padding: 40px;
      transition: all 0.3s ease;
      animation: slideIn 0.5s ease-out, float 4s ease-in-out infinite;
      position: relative;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    body.dark-mode {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 50%, #0a0a0a 100%);
    }
    body.dark-mode .register-card {
      background: rgba(45, 45, 45, 0.1);
      color: #f0f0f0;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.2);
    }
    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .register-header h2 {
      color: #333;
      font-weight: 700;
      margin-bottom: 10px;
    }
    body.dark-mode .register-header h2 {
      color: #f0f0f0;
    }
    .register-header p {
      color: #666;
      font-size: 14px;
    }
    body.dark-mode .register-header p {
      color: #aaa;
    }
    .form-icon {
      position: relative;
    }
    .form-icon i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      z-index: 1;
    }
    body.dark-mode .form-icon i {
      color: #764ba2;
    }
    .form-icon input {
      padding-left: 45px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      transition: all 0.3s ease;
    }
    .form-icon input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }
    body.dark-mode .form-icon input {
      background-color: #3d3d3d;
      border-color: #555;
      color: #f0f0f0;
    }
    body.dark-mode .form-icon input:focus {
      border-color: #764ba2;
      box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.25);
    }
    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    body.dark-mode .form-label {
      color: #f0f0f0;
    }
    .btn-register {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-register:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .spotlight-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 10px;
      padding: 10px 15px;
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 14px;
      z-index: 1000;
    }
    .spotlight-toggle:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    body.dark-mode .login-link {
      color: #aaa;
    }
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    body.dark-mode .login-link a {
      color: #764ba2;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .alert-message {
      border-radius: 10px;
      padding: 12px;
      margin-top: 15px;
      font-size: 14px;
    }
    .back-home {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: all 0.3s ease;
    }
    .back-home:hover {
      transform: translateX(-5px);
      color: #f0f0f0;
    }
    @media (max-width: 576px) {
      .register-card {
        padding: 30px 20px;
      }
      .toggle-mode-btn {
        top: 10px;
        right: 10px;
        padding: 8px 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body class="light-mode">
  <!-- Add secondary sweep -->
  <div class="secondary-sweep"></div>
  <!-- Add Spotlight Element -->
  <div class="spotlight" id="spotlight"></div>
  <a href="index.html" class="back-home">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>
  <button class="spotlight-toggle" onclick="toggleSpotlight()">
    <i class="fas fa-lightbulb"></i> Spotlight OFF
  </button>

  <div class="register-container">
    <div class="register-card">
      <div class="register-header">
        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
        <p>Join us and start your learning journey</p>
      </div>
      
      <form id="registerForm">
        <div class="mb-4">
          <label class="form-label">Full Name</label>
          <div class="form-icon">
            <i class="fas fa-user"></i>
            <input id="name" type="text" class="form-control" placeholder="Enter your full name" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <div class="form-icon">
            <i class="fas fa-envelope"></i>
            <input id="regEmail" type="email" class="form-control" placeholder="Enter your email" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="form-icon">
            <i class="fas fa-lock"></i>
            <input id="regPassword" type="password" class="form-control" placeholder="Create a password" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-register w-100">
          <i class="fas fa-user-plus"></i> Register
        </button>
        <div id="registerMsg" class="alert-message" style="display:none;"></div>
        <div class="login-link">
          Already have an account? <a href="login.html">Login here</a>
        </div>
      </form>
    </div>
  </div>

<script src="js/script.js"></script>
<script>
  // ===== Spotlight Toggle =====
  let spotlightOn = false;
  function toggleSpotlight() {
    const spotlight = document.getElementById('spotlight');
    const btn = document.querySelector('.spotlight-toggle');
    if (spotlightOn) {
      spotlight.style.opacity = '0';
      spotlight.style.animationPlayState = 'paused';
      btn.innerHTML = '<i class="fas fa-lightbulb"></i> Spotlight OFF';
    } else {
      spotlight.style.opacity = '1';
      spotlight.style.animationPlayState = 'running';
      btn.innerHTML = '<i class="fas fa-lightbulb"></i> Spotlight ON';
    }
    spotlightOn = !spotlightOn;
  }
</script>
</body>
</html>
