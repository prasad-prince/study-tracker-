<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="light-mode">

<div class="container mt-5">
  <h2 class="text-center mb-4">Create Your Account</h2>
  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input id="name" type="text" class="form-control" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input id="regEmail" type="email" class="form-control" required />
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input id="regPassword" type="password" class="form-control" required />
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
    <div id="registerMsg" class="mt-3 text-center" style="display:none;"></div>
    <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
  </form>
  <div class="text-center mt-4">
    <button class="btn btn-outline-dark" onclick="toggleDarkMode()">Toggle Dark Mode</button>
  </div>
</div>

<script src="js/script.js"></script>
<script>
  const registerForm = document.getElementById('registerForm');
  if (registerForm) {
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const msg = document.getElementById('registerMsg');
      msg.style.display = 'none';
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {}
        if (!res.ok) throw new Error(data.error || raw || 'Registration failed');
        msg.className = 'mt-3 text-center text-success';
        msg.textContent = 'Registered! Redirecting to login...';
        msg.style.display = 'block';
        setTimeout(() => { window.location.href = 'login.html'; }, 1200);
      } catch (err) {
        msg.className = 'mt-3 text-center text-danger';
        msg.textContent = err.message;
        msg.style.display = 'block';
      }
    });
  }
</script>
</body>
</html>
