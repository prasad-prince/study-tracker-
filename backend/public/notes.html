<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Study Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s ease;
    }
    body.dark-mode {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .notes-container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .notes-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 30px;
      transition: all 0.3s ease;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body.dark-mode .notes-card {
      background: #2d2d2d;
      color: #f0f0f0;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .editor-section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      animation: fadeIn 0.8s ease;
    }
    body.dark-mode .editor-section {
      background: #3d3d3d;
    }
    .editor-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .editor-btn {
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .editor-btn:hover {
      background: #f0f0f0;
      transform: scale(1.05);
    }
    body.dark-mode .editor-btn {
      background: #2d2d2d;
      border-color: #555;
      color: #f0f0f0;
    }
    #noteInput {
      min-height: 200px;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      transition: all 0.3s ease;
    }
    #noteInput:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    body.dark-mode #noteInput {
      background: #1f1f1f;
      border-color: #555;
      color: #f0f0f0;
    }
    .file-upload-area {
      border: 2px dashed #ddd;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }
    .file-upload-area:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }
    body.dark-mode .file-upload-area {
      border-color: #555;
      background: #2d2d2d;
    }
    body.dark-mode .file-upload-area:hover {
      background: #3d3d3d;
    }
    .note-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      animation: fadeIn 1s ease;
    }
    .note-item:hover {
      transform: translateX(5px);
    }
    body.dark-mode .note-item {
      background: #3d3d3d;
      color: #f0f0f0;
    }
    .note-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .back-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      color: white;
    }
  </style>
</head>
<body class="light-mode">
  <div class="notes-container">
    <div class="notes-card">
      <div class="page-header">
        <h2><i class="fas fa-book"></i> My Notes</h2>
        <div>
          <a href="dashboard.html" class="back-btn me-2">
            <i class="fas fa-arrow-left"></i> Back
          </a>
          <button class="btn btn-outline-dark" onclick="toggleMode()">
            <i class="fas fa-moon"></i> Dark Mode
          </button>
        </div>
      </div>

      <div class="editor-section">
        <h4><i class="fas fa-edit"></i> Create New Note</h4>
        
        <div class="editor-toolbar">
          <button class="editor-btn" onclick="formatText('bold')" title="Bold"><i class="fas fa-bold"></i></button>
          <button class="editor-btn" onclick="formatText('italic')" title="Italic"><i class="fas fa-italic"></i></button>
          <button class="editor-btn" onclick="formatText('underline')" title="Underline"><i class="fas fa-underline"></i></button>
          <button class="editor-btn" onclick="insertBullet()" title="Bullet List"><i class="fas fa-list-ul"></i></button>
          <button class="editor-btn" onclick="insertNumbered()" title="Numbered List"><i class="fas fa-list-ol"></i></button>
        </div>

        <textarea id="noteInput" class="form-control" placeholder="Write your notes here... You can use formatting buttons above."></textarea>
        
        <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt" style="font-size: 32px; color: #667eea; margin-bottom: 10px;"></i>
          <p>Click to upload a file or drag and drop</p>
          <small>Supported: PDF, DOC, TXT, Images</small>
          <input type="file" id="fileInput" style="display: none;" multiple accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png">
        </div>
        <div id="uploadedFiles" class="mb-3"></div>

        <button class="btn btn-primary" onclick="saveNote()">
          <i class="fas fa-save"></i> Save Note
        </button>
      </div>

      <div>
        <h4><i class="fas fa-list"></i> Saved Notes</h4>

        <!-- Sorting Options -->
        <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
          <label style="font-weight: 600; margin: 0;">Sort by:</label>
          <button class="btn btn-sm btn-outline-primary" id="sortNewest" onclick="sortNotes('newest')" style="font-size: 0.85rem;">
            <i class="fas fa-arrow-down"></i> Newest First
          </button>
          <button class="btn btn-sm btn-outline-primary" id="sortOldest" onclick="sortNotes('oldest')" style="font-size: 0.85rem;">
            <i class="fas fa-arrow-up"></i> Oldest First
          </button>
          <button class="btn btn-sm btn-outline-primary" id="sortAZ" onclick="sortNotes('a-z')" style="font-size: 0.85rem;">
            <i class="fas fa-arrow-right"></i> A to Z
          </button>
          <button class="btn btn-sm btn-outline-primary" id="sortZA" onclick="sortNotes('z-a')" style="font-size: 0.85rem;">
            <i class="fas fa-arrow-left"></i> Z to A
          </button>
        </div>

        <div id="notesList"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (window && window.location && window.location.origin)
      ? window.location.origin
      : 'http://localhost:4003';

    let uploadedFiles = [];
    let currentSortType = 'newest'; // Track current sort type
    let allNotes = []; // Store all notes for sorting

    // Get JWT token from localStorage
    function getAuthToken() {
      return localStorage.getItem('authToken');
    }

    // API Helper: Make authenticated requests
    async function apiCall(endpoint, method = 'GET', body = null) {
      const token = getAuthToken();

      if (!token) {
        console.error('❌ No authentication token found');
        window.location.href = 'login.html';
        return null;
      }

      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        }
      };

      if (body) {
        options.body = JSON.stringify(body);
      }

      try {
        console.log(`📡 ${method} ${API_BASE}${endpoint}`);
        const response = await fetch(`${API_BASE}${endpoint}`, options);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        console.log(`✅ ${method} ${endpoint} - Success`, data);
        return data;
      } catch (error) {
        console.error(`❌ ${method} ${endpoint} failed:`, error);
        return null;
      }
    }

    function toggleMode() {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      const btn = document.querySelector('button[onclick="toggleMode()"]');
      if (btn) {
        btn.innerHTML = isDark
          ? '<i class="fas fa-sun"></i> Light Mode'
          : '<i class="fas fa-moon"></i> Dark Mode';
      }
    }

    function formatText(command) {
      document.execCommand(command, false, null);
      document.getElementById('noteInput').focus();
    }

    function insertBullet() {
      document.execCommand('insertUnorderedList', false, null);
    }

    function insertNumbered() {
      document.execCommand('insertOrderedList', false, null);
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        uploadedFiles.push(file);
        const fileDiv = document.createElement('div');
        fileDiv.className = 'alert alert-info d-flex justify-content-between align-items-center';
        fileDiv.innerHTML = `
          <span><i class="fas fa-file"></i> ${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
          <button class="btn btn-sm btn-danger" onclick="removeFile('${file.name}')">
            <i class="fas fa-times"></i>
          </button>
        `;
        document.getElementById('uploadedFiles').appendChild(fileDiv);
      });
    });

    function removeFile(fileName) {
      uploadedFiles = uploadedFiles.filter(f => f.name !== fileName);
      const fileDivs = document.querySelectorAll('#uploadedFiles .alert');
      fileDivs.forEach(div => {
        if (div.textContent.includes(fileName)) div.remove();
      });
    }

    // Sorting function
    function sortNotes(sortType) {
      currentSortType = sortType;

      // Update button states to show which sort is active
      document.getElementById('sortNewest').classList.remove('active');
      document.getElementById('sortOldest').classList.remove('active');
      document.getElementById('sortAZ').classList.remove('active');
      document.getElementById('sortZA').classList.remove('active');

      if (sortType === 'newest') document.getElementById('sortNewest').classList.add('active');
      if (sortType === 'oldest') document.getElementById('sortOldest').classList.add('active');
      if (sortType === 'a-z') document.getElementById('sortAZ').classList.add('active');
      if (sortType === 'z-a') document.getElementById('sortZA').classList.add('active');

      renderNotes();
    }

    // Load notes from API
    async function loadNotes() {
      console.log('🔍 Fetching notes from database...');
      const result = await apiCall('/api/notes');

      if (!result) {
        console.error('❌ Failed to load notes');
        return;
      }

      allNotes = result.notes || [];
      console.log(`✅ Loaded ${allNotes.length} notes from database`);
      renderNotes();
    }

    // Render notes with sorting
    function renderNotes() {
      let notes = [...allNotes]; // Copy for sorting

      // Sort notes based on current sort type
      if (currentSortType === 'newest') {
        notes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (currentSortType === 'oldest') {
        notes.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      } else if (currentSortType === 'a-z') {
        notes.sort((a, b) => {
          const textA = (a.text || '').toLowerCase();
          const textB = (b.text || '').toLowerCase();
          return textA.localeCompare(textB);
        });
      } else if (currentSortType === 'z-a') {
        notes.sort((a, b) => {
          const textA = (a.text || '').toLowerCase();
          const textB = (b.text || '').toLowerCase();
          return textB.localeCompare(textA);
        });
      }

      const list = document.getElementById('notesList');

      if (notes.length === 0) {
        list.innerHTML = '<p class="text-muted text-center p-4">No notes yet. Create your first note above!</p>';
        return;
      }

      list.innerHTML = notes.map((note) => {
        const date = new Date(note.createdAt).toLocaleString();
        return `
          <div class="note-item">
            <div style="white-space: pre-wrap; margin-bottom: 10px;">${note.text || ''}</div>
            ${note.files && note.files.length > 0 ? `
              <div class="mb-2">
                <strong>Attachments:</strong>
                ${note.files.map(f => `<span class="badge bg-secondary me-2"><i class="fas fa-file"></i> ${f.name}</span>`).join('')}
              </div>
            ` : ''}
            <small class="text-muted"><i class="fas fa-clock"></i> ${date}</small>
            <div class="note-actions">
              <button class="btn btn-sm btn-primary" onclick="downloadNote('${note._id}', '${note.text.replace(/'/g, "\\'")}')">
                <i class="fas fa-download"></i> Download
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteNote('${note._id}')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Save note to database
    async function saveNote() {
      const input = document.getElementById('noteInput');
      const text = input.value.trim();

      if (!text && uploadedFiles.length === 0) {
        alert('Please write a note or upload a file');
        return;
      }

      const fileData = uploadedFiles.map(f => ({
        name: f.name,
        size: f.size,
        type: f.type
      }));

      const noteData = {
        text: text,
        files: fileData
      };

      console.log('💾 Saving note to database...', noteData);
      const result = await apiCall('/api/notes', 'POST', noteData);

      if (result && result.success) {
        console.log('✅ Note saved successfully');
        input.value = '';
        uploadedFiles = [];
        document.getElementById('uploadedFiles').innerHTML = '';
        loadNotes();
      } else {
        alert('Failed to save note. Please try again.');
      }
    }

    // Download note
    function downloadNote(noteId, noteText) {
      const blob = new Blob([noteText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `note_${noteId}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Delete note
    async function deleteNote(noteId) {
      console.log('🗑️ Deleting note:', noteId);
      const result = await apiCall(`/api/notes/${noteId}`, 'DELETE');

      if (result && result.success) {
        console.log('✅ Note deleted successfully');
        loadNotes();
      } else {
        alert('Failed to delete note. Please try again.');
      }
    }

    window.addEventListener('DOMContentLoaded', function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        document.body.classList.remove('light-mode');
        const btn = document.querySelector('button[onclick="toggleMode()"]');
        if (btn) btn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
      }

      // Check authentication and load notes
      const token = getAuthToken();
      if (!token) {
        console.error('❌ Not authenticated - redirecting to login');
        window.location.href = 'login.html';
        return;
      }

      loadNotes();
    });
  </script>
</body>
</html>
